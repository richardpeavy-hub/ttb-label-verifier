<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TTB Field Inspection Utility</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>TTB Label Verification Assistant</h1>
        <div class="system-status">Offline Mode Active (Firewall Bypass)</div>
    </header>

    <main class="app-container">
        <section class="panel record-panel">
            <h2>Official Application Data</h2>
            <div id="official-data-view">
                </div>
        </section>

        <section class="panel scan-panel">
            <h2>Physical Bottle Audit</h2>
            
            <div class="input-group">
                <label for="camera-capture" class="scanner-btn">📷 Scan Bottle Label</label>
                <input type="file" id="camera-capture" accept="image/*" capture="environment">
            </div>

            <div id="image-preview-container" class="hidden">
                <h3>Captured Label Image:</h3>
                <img id="label-preview" src="" alt="Captured bottle label snapshot">
            </div>

            <div id="audit-results" class="hidden">
                <h3>Audit Results</h3>
                <div id="results-output"></div>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
